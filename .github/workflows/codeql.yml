name: CodeQL Security Scan

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "database/**"
      - "hooks/**"
      - "lib/**"
      - "middleware.ts"
      - "auth.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/**"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "app/**"
      - "components/**"
      - "database/**"
      - "hooks/**"
      - "lib/**"
      - "middleware.ts"
      - "auth.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - ".github/workflows/codeql.yml"
      - ".github/codeql/**"
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
