name: PR Size Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size:
    name: Label pull request size
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Apply size label
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const changed = files.reduce((total, file) => {
              return total + file.additions + file.deletions;
            }, 0);

            const sizes = [
              { name: "size/XS", color: "2ea043", max: 20 },
              { name: "size/S", color: "56d364", max: 100 },
              { name: "size/M", color: "d29922", max: 400 },
              { name: "size/L", color: "fb8500", max: 1000 },
              { name: "size/XL", color: "da3633", max: Number.POSITIVE_INFINITY },
            ];

            const next = sizes.find((size) => changed <= size.max);
            const existing = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            for (const size of sizes) {
              if (!existing.some((label) => label.name === size.name)) {
                continue;
              }
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pull_number,
                name: size.name,
              });
            }

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: next.name,
                color: next.color,
                description: `Approximate PR size: ${changed} changed lines`,
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: [next.name],
            });
