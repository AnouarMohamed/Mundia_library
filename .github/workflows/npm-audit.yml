name: NPM Security Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  schedule:
    - cron: "15 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Fail on critical production advisories
        run: npm audit --omit=dev --audit-level=critical

      - name: Generate full advisory report
        if: always()
        run: npm audit --omit=dev --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 14
