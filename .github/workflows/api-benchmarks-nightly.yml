name: API Performance Benchmarks Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-bench-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-nightly:
    name: Nightly benchmark key API routes
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: library_management
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpassword --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:rootpassword@127.0.0.1:3306/library_management
      NEXTAUTH_SECRET: ${{ secrets['NEXTAUTH_SECRET'] || 'ci-bench-secret' }}
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_ENDPOINT: http://127.0.0.1:3000
      NEXT_PUBLIC_PROD_API_ENDPOINT: http://127.0.0.1:3000
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: https://example.com
      NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY: ${{ secrets['NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY'] || 'ci-build-public-key' }}
      IMAGEKIT_PRIVATE_KEY: ${{ secrets['IMAGEKIT_PRIVATE_KEY'] || 'ci-build-private-key' }}
      UPSTASH_REDIS_URL: ${{ secrets['UPSTASH_REDIS_URL'] || 'https://example.upstash.io' }}
      UPSTASH_REDIS_TOKEN: ${{ secrets['UPSTASH_REDIS_TOKEN'] || 'ci-build-token' }}
      QSTASH_URL: ${{ secrets['QSTASH_URL'] || 'https://qstash.upstash.io' }}
      QSTASH_TOKEN: ${{ secrets['QSTASH_TOKEN'] || 'ci-build-token' }}
      BREVO_API_KEY: ${{ secrets['BREVO_API_KEY'] || 'ci-build-token' }}
      BREVO_SENDER_EMAIL: ${{ secrets['BREVO_SENDER_EMAIL'] || 'noreply@example.com' }}
      RESEND_TOKEN: ${{ secrets['RESEND_TOKEN'] || 'ci-build-token' }}
      ENABLE_WORKFLOWS: "false"
      DISABLE_RATE_LIMIT: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      BENCH_BASE_URL: http://127.0.0.1:3000
      BENCH_WARMUP: "8"
      BENCH_ITERATIONS: "30"
      BENCH_ROUNDS: "5"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply schema and seed
        run: |
          npm run db:migrate
          npm run seed

      - name: Build app
        run: npm run build

      - name: Start app and run benchmarks
        run: |
          set -euo pipefail

          npm run start > /tmp/next-server.log 2>&1 &
          SERVER_PID=$!

          cleanup() {
            if kill -0 "$SERVER_PID" >/dev/null 2>&1; then
              kill "$SERVER_PID" >/dev/null 2>&1 || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for i in {1..90}; do
            if curl -sf "http://127.0.0.1:3000/api/books?limit=1" >/dev/null; then
              echo "API server is ready"
              break
            fi
            sleep 2
          done

          if ! curl -sf "http://127.0.0.1:3000/api/books?limit=1" >/dev/null; then
            echo "Server failed to start"
            cat /tmp/next-server.log
            exit 1
          fi

          node scripts/benchmark-api-routes.mjs

      - name: Upload nightly benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-benchmark-nightly-${{ github.run_number }}
          path: |
            /tmp/api-benchmark-summary.md
            /tmp/api-benchmark-results.json
            /tmp/next-server.log
          if-no-files-found: ignore
          retention-days: 30
