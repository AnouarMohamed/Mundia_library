name: Container Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.mjs
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.mjs
  schedule:
    - cron: "45 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Scan Docker image with Trivy
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          load: true
          tags: mundia-library:security-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: mundia-library:security-scan
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Block critical image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: mundia-library:security-scan
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
