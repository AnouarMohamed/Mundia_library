name: Container Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.ts
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.ts
  schedule:
    - cron: "45 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: container-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Scan Docker image with Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: mundia-library:security-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: mundia-library:security-scan
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Block critical image vulnerabilities
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: mundia-library:security-scan
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
