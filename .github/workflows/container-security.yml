name: Container Security Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.mjs
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
      - next.config.mjs
  schedule:
    - cron: "45 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Scan Docker image with Trivy
    if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          load: true
          tags: mundia-library:security-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: mundia-library:security-scan
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-results.sarif

      - name: Block critical image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: mundia-library:security-scan
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
