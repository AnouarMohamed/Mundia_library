version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Africa/Casablanca
    open-pull-requests-limit: 8
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - security
    commit-message:
      prefix: deps
      include: scope
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Africa/Casablanca
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
      - security
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Africa/Casablanca
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - security
    commit-message:
      prefix: docker
      include: scope
