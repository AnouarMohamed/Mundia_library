services:
  db:
    image: postgres:15
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-library_management}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootpassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: library_app
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-rootpassword}@db:5432/${POSTGRES_DB:-library_management}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXT_PUBLIC_API_ENDPOINT: ${NEXT_PUBLIC_API_ENDPOINT:-http://localhost:3000}
      NEXT_PUBLIC_PROD_API_ENDPOINT: ${NEXT_PUBLIC_PROD_API_ENDPOINT:-http://localhost:3000}
      ENABLE_WORKFLOWS: ${ENABLE_WORKFLOWS:-false}
    ports:
      - "${APP_PORT:-3000}:3000"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: db-tools
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-rootpassword}@db:5432/${POSTGRES_DB:-library_management}
    command: npm run db:migrate

  seed:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
      target: db-tools
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-rootpassword}@db:5432/${POSTGRES_DB:-library_management}
    command: npm run seed

  adminer:
    image: adminer:4.8.1-standalone
    container_name: library_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  postgres_data:
